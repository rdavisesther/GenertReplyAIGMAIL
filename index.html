<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reply Generator</title>

<style>
body {
  background: #0d0d0f;
  color: #f0efea;
  font-family: Arial, sans-serif;
  padding: 40px;
}

.container {
  max-width: 720px;
  margin: auto;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

h1 span {
  color: #b6f542;
}

.subtitle {
  color: #9b9ba3;
  margin-bottom: 30px;
}

.card {
  background: #141417;
  border: 1px solid #2a2a30;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 14px;
}

label {
  display: block;
  font-size: 12px;
  color: #9b9ba3;
  margin-bottom: 8px;
  text-transform: uppercase;
}

textarea {
  width: 100%;
  min-height: 150px;
  background: #1c1c21;
  color: #ffffff;
  border: 1px solid #33333a;
  border-radius: 10px;
  padding: 14px;
  font-size: 14px;
  box-sizing: border-box;
  resize: vertical;
}

select {
  width: 100%;
  background: #1c1c21;
  color: #ffffff;
  border: 1px solid #33333a;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}

.row {
  display: table;
  width: 100%;
}

.col {
  display: table-cell;
  width: 50%;
  padding-right: 10px;
}

.col:last-child {
  padding-right: 0;
}

button {
  width: 100%;
  background: #b6f542;
  color: #0d0d0f;
  border: none;
  border-radius: 10px;
  padding: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 12px;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.result-card {
  display: none;
  background: #141417;
  border: 1px solid rgba(182,245,66,0.3);
  border-radius: 14px;
  padding: 20px;
  margin-top: 14px;
}

.result-card.visible {
  display: block;
}

.reply-text {
  background: #1c1c21;
  border: 1px solid #33333a;
  border-radius: 10px;
  padding: 16px;
  min-height: 80px;
  white-space: pre-wrap;
  line-height: 1.6;
}

.btn-copy {
  margin-top: 12px;
}

.error-msg {
  display: none;
  background: rgba(255,80,80,0.12);
  border: 1px solid rgba(255,80,80,0.35);
  color: #ff6b6b;
  border-radius: 10px;
  padding: 12px;
  margin-top: 12px;
  font-size: 13px;
}

.error-msg.visible {
  display: block;
}

.copy-feedback {
  color: #b6f542;
  font-size: 12px;
  height: 18px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Auto-reply<br><span>generator</span></h1>
  <p class="subtitle">Paste received email → AI writes a natural human reply</p>

  <div class="card">
    <label>Received email</label>
    <textarea id="emailInput" placeholder="Paste received email here..."></textarea>
  </div>

  <div class="card">
    <div class="row">
      <div class="col">
        <label>Tone</label>
        <select id="tone">
          <option value="Friendly and casual">Friendly & casual</option>
          <option value="Professional">Professional</option>
          <option value="Very short">Very short</option>
          <option value="Warm and personal">Warm & personal</option>
          <option value="Curious and engaging">Curious & engaging</option>
        </select>
      </div>

      <div class="col">
        <label>Language</label>
        <select id="lang">
          <option value="English">English</option>
          <option value="French">French</option>
          <option value="Moroccan Darija">Darija</option>
          <option value="Spanish">Spanish</option>
          <option value="Italian">Italian</option>
          <option value="German">German</option>
        </select>
      </div>
    </div>

    <label>Context optional</label>
    <textarea id="contextInput" placeholder="Example: I'm replying as a SaaS founder..."></textarea>
  </div>

  <button id="generateBtn" onclick="generateReply()">Generate reply →</button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-card" id="resultCard">
    <label>AI reply ready</label>
    <div class="reply-text" id="replyOutput"></div>

    <button class="btn-copy" onclick="copyReply()">Copy reply</button>
    <div class="copy-feedback" id="copyFeedback"></div>
  </div>

</div>

<script>
var API_URL = "/api/generate-reply";

function generateReply() {
  var email = document.getElementById("emailInput").value;
  var tone = document.getElementById("tone").value;
  var lang = document.getElementById("lang").value;
  var context = document.getElementById("contextInput").value;

  if (!email || trimText(email) === "") {
    showError("Please paste an email first.");
    return;
  }

  hideError();
  setLoading(true);

  document.getElementById("resultCard").className = "result-card";
  document.getElementById("replyOutput").textContent = "";

  var prompt =
    "You are helping with email warmup.\n\n" +
    "Read the email below and write a natural human-like reply.\n\n" +
    "Rules:\n" +
    "- Tone: " + tone + "\n" +
    "- Language: " + lang + "\n" +
    "- Sound like a real person\n" +
    "- Do not sound robotic\n" +
    "- No subject line\n" +
    "- No signature\n" +
    "- Keep it natural and short\n";

  if (context && trimText(context) !== "") {
    prompt += "- Context: " + context + "\n";
  }

  prompt +=
    "\nEmail received:\n" +
    "---\n" +
    email +
    "\n---\n\n" +
    "Write only the reply.";

  var xhr = new XMLHttpRequest();

  xhr.open("POST", API_URL, true);
  xhr.setRequestHeader("Content-Type", "application/json");

  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4) {
      setLoading(false);

      try {
        var data = JSON.parse(xhr.responseText);

        if (xhr.status !== 200 || data.error) {
          showError(data.error || "API error");
          return;
        }

        var reply = data.reply ? trimText(data.reply) : "";

        if (!reply) {
          showError("Empty reply from AI.");
          return;
        }

        document.getElementById("replyOutput").textContent = reply;
        document.getElementById("resultCard").className = "result-card visible";

      } catch (e) {
        showError("Invalid server response.");
      }
    }
  };

  xhr.onerror = function () {
    setLoading(false);
    showError("Network error.");
  };

  xhr.send(JSON.stringify({
    prompt: prompt
  }));
}

function copyReply() {
  var text = document.getElementById("replyOutput").textContent;

  if (!text || trimText(text) === "") {
    showError("Nothing to copy.");
    return;
  }

  var textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "-9999px";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand("copy");
    showCopyFeedback();
  } catch (e) {
    showError("Copy not supported in this browser.");
  }

  document.body.removeChild(textarea);
}

function showCopyFeedback() {
  var fb = document.getElementById("copyFeedback");
  fb.textContent = "Copied!";
  setTimeout(function () {
    fb.textContent = "";
  }, 2000);
}

function setLoading(state) {
  var btn = document.getElementById("generateBtn");

  if (state) {
    btn.disabled = true;
    btn.innerHTML = "Generating...";
  } else {
    btn.disabled = false;
    btn.innerHTML = "Generate reply →";
  }
}

function showError(msg) {
  var el = document.getElementById("errorMsg");
  el.innerHTML = msg;
  el.className = "error-msg visible";
}

function hideError() {
  var el = document.getElementById("errorMsg");
  el.innerHTML = "";
  el.className = "error-msg";
}

function trimText(str) {
  return str.replace(/^\s+|\s+$/g, "");
}
</script>

</body>
</html>
